# yaml-language-server: $schema=https://raw.githubusercontent.com/mattn/efm-langserver/refs/heads/master/schema.json
version: 2
root-markers:
  - .git/
  - package.json
lint-debounce: 1s

tools:
  prettier-or-oxfmt: &prettier-or-oxfmt
    format-command: >
      bash -c 'input=$1;
      dir=$(dirname -- "$input");
      while [[ -n "$dir" && "$dir" != "/" ]]; do
        for config in .prettierrc .prettierrc.json .prettierrc.json5 .prettierrc.yml .prettierrc.yaml .prettierrc.toml .prettierrc.js .prettierrc.mjs .prettierrc.cjs .prettierrc.ts .prettierrc.mts .prettierrc.cts prettier.config.js prettier.config.mjs prettier.config.cjs prettier.config.ts prettier.config.mts prettier.config.cts; do
          [[ -e "$dir/$config" ]] && exec prettierd "$input"
        done
        [[ -e "$dir/.git" ]] && break
        dir=$(dirname -- "$dir")
      done;
      exec oxfmt --stdin-filepath "$input"' -- "${INPUT}"
    format-stdin: true
    root-markers:
      - .oxfmtrc.json
      - .oxfmtrc.jsonc
      - .prettierrc
      - package.json
      - .git
  # Lua
  stylua: &stylua
    format-command: "stylua -s --color Never -"
    format-stdin: true
    root-markers:
      - stylua.toml
      - .stylua.toml
  # Go
  golangci-lint-fmt: &golangci-lint-fmt
    format-command: "golangci-lint fmt --stdin"
    format-stdin: true
    root-markers:
      - .golangci.yml
      - .golangci.yaml
      - go.mod
      - go.sum
  # Terraform
  terraform-fmt: &terraform-fmt
    format-command: "terraform fmt -"
    format-stdin: true
  # OCaml
  ocamlformat: &ocamlformat
    format-command: 'ocamlformat --name "${INPUT}" -'
    format-stdin: true
    root-markers:
      - .ocamlformat
  # Jsonnet
  jsonnetfmt: &jsonnetfmt
    format-command: "jsonnetfmt -"
    format-stdin: true
  # YAML
  yamllint: &yamllint
    lint-command: "yamllint -f parsable -"
    lint-stdin: true
    lint-ignore-exit-code: true
    lint-formats:
      - "stdin:%l:%c: [%tarning] %m"
      - "stdin:%l:%c: [%trror] %m"
    root-markers:
      - .yamllint
      - .yamllint.yml
      - .yamllint.yaml
  actionlint: &actionlint
    lint-command: >
      bash -c '[[ "${INPUT}" =~ \.github/workflows/ ]] &&
      actionlint -oneline -no-color -stdin-filename ${INPUT} -'
    lint-stdin: true
    lint-formats:
      - "%f:%l:%c: %m"
    root-markers:
      - .github
  # Shell
  fish_indent: &fish_indent
    format-command: "fish_indent"
    format-stdin: true
  fish_diagnostics: &fish_diagnostics
    lint-command: 'fish --no-execute "${INPUT}"'
    lint-ignore-exit-code: true
    lint-formats:
      - "%f (line %l): %m"
  shellcheck: &shellcheck
    lint-command: "shellcheck -f gcc -x"
    lint-source: shellcheck
    lint-formats:
      - "%f:%l:%c: %trror: %m"
      - "%f:%l:%c: %tarning: %m"
      - "%f:%l:%c: %tote: %m"
  # Typst
  typstyle: &typstyle
    format-command: typstyle
    format-stdin: true
languages:
  lua:
    - <<: *stylua
  go:
    - <<: *golangci-lint-fmt
  ocaml:
    - <<: *ocamlformat
  # web
  html:
    - <<: *prettier-or-oxfmt
  css:
    - <<: *prettier-or-oxfmt
  markdown:
    - <<: *prettier-or-oxfmt
  javascript:
    - <<: *prettier-or-oxfmt
  javascriptreact:
    - <<: *prettier-or-oxfmt
  typescript:
    - <<: *prettier-or-oxfmt
  typescriptreact:
    - <<: *prettier-or-oxfmt
  # config
  json:
    - <<: *prettier-or-oxfmt
  jsonc:
    - <<: *prettier-or-oxfmt
  json5:
    - <<: *prettier-or-oxfmt
  jsonnet:
    - <<: *jsonnetfmt
  yaml:
    - <<: *prettier-or-oxfmt
    - <<: *yamllint
    - <<: *actionlint
  terraform:
    - <<: *terraform-fmt
  # shell
  fish:
    - <<: *fish_indent
    - <<: *fish_diagnostics
  sh:
    - <<: *shellcheck
  bash:
    - <<: *shellcheck
  # Typst
  typst:
    - <<: *typstyle
